<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Walmart AI Assistant</title>
  <script src="https://cdn.jsdelivr.net/npm/jquery@3.6.0/dist/jquery.min.js"></script>
  <script src="https://tableau.github.io/extensions-api/lib/tableau.extensions.1.latest.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #1a1a2e;
      color: #e0e0e0;
      height: 100vh;
      display: flex;
      flex-direction: column;
    }

    #header {
      background: #16213e;
      padding: 12px 16px;
      border-bottom: 1px solid #0f3460;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    #header h1 {
      font-size: 14px;
      font-weight: 600;
      color: #4fc3f7;
    }

    #header .status {
      font-size: 11px;
      color: #81c784;
      margin-left: auto;
    }

    #messages {
      flex: 1;
      overflow-y: auto;
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .message {
      max-width: 90%;
      padding: 10px 14px;
      border-radius: 12px;
      font-size: 13px;
      line-height: 1.5;
      white-space: pre-wrap;
    }

    .message.user {
      background: #0f3460;
      color: #e0e0e0;
      align-self: flex-end;
      border-bottom-right-radius: 4px;
    }

    .message.claude {
      background: #16213e;
      color: #e0e0e0;
      align-self: flex-start;
      border-bottom-left-radius: 4px;
      border: 1px solid #0f3460;
    }

    .message.system {
      background: transparent;
      color: #78909c;
      align-self: center;
      font-size: 11px;
      font-style: italic;
    }

    .message.tool {
      background: transparent;
      color: #4fc3f7;
      align-self: flex-start;
      font-size: 11px;
      font-style: italic;
    }

    .message.error {
      background: #3e1a1a;
      color: #ef9a9a;
      align-self: flex-start;
      font-size: 12px;
    }

    #input-area {
      padding: 12px 16px;
      background: #16213e;
      border-top: 1px solid #0f3460;
      display: flex;
      gap: 8px;
    }

    #question-input {
      flex: 1;
      background: #0f3460;
      border: 1px solid #1565c0;
      border-radius: 8px;
      padding: 8px 12px;
      color: #e0e0e0;
      font-size: 13px;
      outline: none;
      resize: none;
      height: 38px;
      font-family: inherit;
    }

    #question-input:focus {
      border-color: #4fc3f7;
    }

    #question-input::placeholder {
      color: #546e7a;
    }

    #send-btn {
      background: #1565c0;
      color: white;
      border: none;
      border-radius: 8px;
      padding: 8px 16px;
      font-size: 13px;
      cursor: pointer;
      white-space: nowrap;
      transition: background 0.2s;
    }

    #send-btn:hover { background: #1976d2; }
    #send-btn:disabled { background: #37474f; cursor: not-allowed; }

    #refresh-btn {
      background: #1b5e20;
      color: white;
      border: none;
      border-radius: 8px;
      padding: 8px 12px;
      font-size: 12px;
      cursor: pointer;
      transition: background 0.2s;
    }

    #refresh-btn:hover { background: #2e7d32; }
    #refresh-btn:disabled { background: #37474f; cursor: not-allowed; }

    .suggestions {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      padding: 0 16px 12px;
    }

    .suggestion {
      background: #0f3460;
      border: 1px solid #1565c0;
      border-radius: 16px;
      padding: 4px 10px;
      font-size: 11px;
      color: #90caf9;
      cursor: pointer;
      transition: all 0.2s;
    }

    .suggestion:hover {
      background: #1565c0;
      color: white;
    }

    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #37474f; border-radius: 2px; }
  </style>
</head>
<body>

<div id="header">
  <h1>🏪 Walmart AI Assistant</h1>
  <span class="status" id="status">● Connected</span>
</div>

<div id="messages">
  <div class="message system">
    Ask any question about the Walmart store portfolio
  </div>
</div>

<div class="suggestions">
  <span class="suggestion" onclick="fillQuestion('Give me a portfolio summary')">Portfolio summary</span>
  <span class="suggestion" onclick="fillQuestion('Which stores are high risk?')">High risk stores</span>
  <span class="suggestion" onclick="fillQuestion('Which stores are declining?')">Declining stores</span>
  <span class="suggestion" onclick="fillQuestion('Tell me about Store 7')">Store 7 analysis</span>
  <span class="suggestion" onclick="fillQuestion('Refresh the Tableau data source')">Refresh Tableau</span>
</div>

<div id="input-area">
  <textarea id="question-input" placeholder="Ask about any store..." rows="1"></textarea>
  <button id="refresh-btn" onclick="refreshTableau()">↺ Refresh</button>
  <button id="send-btn" onclick="sendQuestion()">Send</button>
</div>

<script>
  const API_URL = 'http://localhost:8000';

  // Initialize Tableau Extension
  tableau.extensions.initializeAsync().then(() => {
    addMessage('system', 'Tableau Extension initialized successfully');
  }).catch(err => {
    addMessage('system', 'Running in standalone mode');
  });

  // Handle Enter key
  document.getElementById('question-input').addEventListener('keydown', function(e) {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      sendQuestion();
    }
  });

  function fillQuestion(text) {
    document.getElementById('question-input').value = text;
    document.getElementById('question-input').focus();
  }

  function addMessage(type, text) {
    const messages = document.getElementById('messages');
    const div = document.createElement('div');
    div.className = `message ${type}`;
    div.textContent = text;
    messages.appendChild(div);
    messages.scrollTop = messages.scrollHeight;
    return div;
  }

  async function sendQuestion() {
    const input = document.getElementById('question-input');
    const question = input.value.trim();
    if (!question) return;

    const sendBtn = document.getElementById('send-btn');
    sendBtn.disabled = true;
    input.value = '';

    // Show user message
    addMessage('user', question);

    // Show thinking indicator
    const thinking = addMessage('system', 'Claude is thinking...');

    try {
      const response = await fetch(`${API_URL}/query`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ question: question })
      });

      const data = await response.json();
      
      // Remove thinking indicator
      thinking.remove();

      // Show tools called
      if (data.tools_called && data.tools_called.length > 0) {
        data.tools_called.forEach(tool => {
          addMessage('tool', `→ ${tool}`);
        });
      }

      // Show Claude's answer
      addMessage('claude', data.answer);

    } catch (err) {
      thinking.remove();
      addMessage('error', `Error: Could not reach API at ${API_URL}. Make sure walmart_api.py is running.`);
    }

    sendBtn.disabled = false;
    input.focus();
  }

  async function refreshTableau() {
    const btn = document.getElementById('refresh-btn');
    btn.disabled = true;
    btn.textContent = '↺ Refreshing...';

    addMessage('system', 'Refreshing Tableau data source...');

    try {
      const response = await fetch(`${API_URL}/query`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ question: 'Refresh the Tableau data source' })
      });

      const data = await response.json();
      addMessage('claude', data.answer);

    } catch (err) {
      addMessage('error', 'Could not refresh. Make sure walmart_api.py is running.');
    }

    btn.disabled = false;
    btn.textContent = '↺ Refresh';
  }
</script>

</body>
</html>
